<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>WebGPU Sanity Check</title></head>
<body style="background:#111;color:#fff;font:16px monospace;padding:20px;">
<pre id="log">Testing WebGPU...</pre>
<script>
const log = document.getElementById('log');
function print(s) { log.textContent += '\n' + s; console.log(s); }

(async () => {
  try {
    print('crossOriginIsolated: ' + crossOriginIsolated);
    print('navigator.gpu: ' + !!navigator.gpu);
    if (!navigator.gpu) { print('FAIL: no WebGPU'); return; }

    print('Requesting adapter...');
    const adapter = await navigator.gpu.requestAdapter();
    print('adapter: ' + !!adapter);
    if (!adapter) { print('FAIL: no adapter'); return; }
    print('adapter.name: ' + (adapter.info?.device || 'unknown'));

    print('Requesting device...');
    const device = await adapter.requestDevice();
    print('device: ' + !!device);

    // Create a tiny compute shader: multiply each element by 2
    const shader = device.createShaderModule({ code: `
      @group(0) @binding(0) var<storage, read> input: array<f32>;
      @group(0) @binding(1) var<storage, read_write> output: array<f32>;
      @compute @workgroup_size(4)
      fn main(@builtin(global_invocation_id) id: vec3u) {
        output[id.x] = input[id.x] * 2.0;
      }
    `});

    const pipeline = device.createComputePipeline({
      layout: 'auto',
      compute: { module: shader, entryPoint: 'main' }
    });

    // Input: [1, 2, 3, 4]
    const inputData = new Float32Array([1, 2, 3, 4]);
    const inputBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
    const outputBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
    const readBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

    device.queue.writeBuffer(inputBuf, 0, inputData);

    const bindGroup = device.createBindGroup({
      layout: pipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: inputBuf } },
        { binding: 1, resource: { buffer: outputBuf } },
      ]
    });

    const cmd = device.createCommandEncoder();
    const pass = cmd.beginComputePass();
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.dispatchWorkgroups(1);
    pass.end();
    cmd.copyBufferToBuffer(outputBuf, 0, readBuf, 0, 16);
    device.queue.submit([cmd.finish()]);

    await readBuf.mapAsync(GPUMapMode.READ);
    const result = new Float32Array(readBuf.getMappedRange());
    print('Input:  [1, 2, 3, 4]');
    print('Output: [' + Array.from(result).join(', ') + ']');
    print(result[0] === 2 && result[1] === 4 && result[2] === 6 && result[3] === 8
      ? 'SUCCESS: WebGPU compute works on this device!'
      : 'FAIL: unexpected output');
    readBuf.unmap();
  } catch (e) {
    print('ERROR: ' + e.message);
    print(e.stack || '');
  }
})();
</script>
</body>
</html>
